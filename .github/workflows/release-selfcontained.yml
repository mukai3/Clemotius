name: Release (self-contained single-file)

# マイルストーンリリース時に「手動で」実行する。対象タグを指定すると、self-contained の
# 単一ファイル版(.NET Runtime 同梱・Runtime 未導入環境でも単体動作)をビルドし、その
# 既存 GitHub Release にアセットとして追加する。
#
# 通常の Release ワークフロー(release.yml: v* タグ push で自動)とは完全に独立しており、
# こちらは手動実行(workflow_dispatch)時のみ走る。サイズが大きい(~150MB)ため毎回は作らず、
# 必要なマイルストーンでのみ手動で添付する運用。
#
# 前提: 対象タグの Release が既に存在すること(通常はタグ push で release.yml が作成済み)。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '対象タグ (例: v0.4)。その Release に単一ファイル版を添付する'
        required: true
        type: string

permissions:
  contents: write # gh release upload に必要

jobs:
  release-selfcontained:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }} # 指定タグ時点の内容をビルドする

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained single-file, win-x64)
        shell: pwsh
        run: |
          $version = "${{ inputs.tag }}".TrimStart('v')
          # WPF はトリミング非対応のため PublishTrimmed は使わない。
          # 単一 exe にまとめ、WPF のネイティブ依存も自己展開で同梱する。圧縮でサイズを抑える。
          dotnet publish src/Clemotius/Clemotius.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none -p:Version=$version `
            -o publish-sc

      - name: Package (zip)
        shell: pwsh
        run: |
          # 通常版(release.yml)と同様に zip 圧縮して配布する。単一 exe を zip に収める。
          Compress-Archive -Path publish-sc/Clemotius.exe `
            -DestinationPath "Clemotius-${{ inputs.tag }}-win-x64-selfcontained.zip"

      - name: Upload to existing Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" `
            "Clemotius-${{ inputs.tag }}-win-x64-selfcontained.zip" --clobber
